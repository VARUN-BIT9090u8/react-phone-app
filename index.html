<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="React Phone" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <style>
      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
:root {
  --status-bar-height: 14px;
  --status-bar-collapsed:6px;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #e5e7eb;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.phone {
  position: relative;
  height: 300px;
  width: 160px;
  background: #f9fafb;
  border: 4px solid black;
  border-radius: 16px;
  /* wallpaper set dynamically via JS */
  box-shadow: 5px 5px 2.5px 6px rgb(200, 210, 210);
  overflow: hidden;
}
.phone {
  transition: 
    transform 0.3s ease,
    box-shadow 0.3s ease;
  cursor: pointer;
}
.phone:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 8px 8px 8px 8px rgb(180, 190, 190);
}

.top-bar {
  width: 80px;
  height: var(--status-bar-height);
  background: rgb(0, 0, 0);
  border: 1px solid #2020202f;
  border-radius: 0 0 12px 12px;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  transition:
    height 0.3s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.3s ease;
  z-index: 10;

}

.side-btn {
  position: absolute;
  right: -8px;
  border: 4px solid black;
  border-radius: 6px;
}

.side-btn.small {
  top: 56px;
  height: 28px;
}

.side-btn.large {
  bottom: 144px;
  height: 40px;
}
.phone-open .top-bar{
  height: var(--status-bar-collapsed);
  opacity: 0.85;
}
.card {
  width: 120px;
  background: rgba(0, 0, 0, 0.9);
  color: white;
  border-radius: 15px;
  padding: 10px;
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  z-index: 5;
}
.card .time {
  font-size:8px;
  font-weight: bold;
}
.card .date {
  margin-top: 6px;
}
.search-box{
  width: 140px;
  height: 20px;
  display:inline-flex;  
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.9);
  border-radius: 24px;    
  box-shadow: 0 1px 6px rgba(32,33,36,0.28);
  padding: 4px 10px; 
  position: absolute;
  top: 105px;
  left: 50%;
  transform: translateX(-50%); 
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
  z-index: 5; 
}
.search-box input {
    width: 100%;
  height: 12px;
  color: rgb(247, 245, 245);
  padding-left: 15px;
  padding-top: 5px;
  padding-bottom: 5px;
  background-color: rgba(0,0,0,0.9);
  border-radius: 24px;
  border: 1px solid #020202;
  font-size: 6px;
  outline: none;

  transition: box-shadow 0.2s ease,
              border-color 0.2s ease;
}

.search-box input:hover,
.search-box input:focus {
  border-color: transparent;
  box-shadow: 0 1px 6px rgba(32,33,36,0.28);
}
.icon-left {
  font-size: 6.5px;
  position: absolute;
  left: 12px;
}
.icon-right {
  font-size: 6.5px;
  position: absolute;
  right: 1px;
}

.status-bar {
  position: absolute;
  top: 1px;
  left: 120px;
  width: 100%;
  height: 16px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 3px;
  font-size: 6px;
  color: white;

  z-index: 10;
  pointer-events: none;
}
.lock-screen {
  position: absolute;
  inset: 0;

  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75));

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  color: white;
  text-align: center;

  z-index: 20;

  animation: lockFadeIn 300ms ease;
}

.lock-time {
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 4px;
}

.lock-date {
  font-size: 7px;
  opacity: 0.85;
}

.lock-hint {
  margin-top: 20px;
  font-size: 6px;
  opacity: 0.6;
  animation: hintPulse 1.6s infinite;
}
@keyframes lockFadeIn {
  from {
    opacity: 0;
    transform: scale(1.02);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes hintPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

.app-dock {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}

.app-dock button {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: none;
  background: #111;
  color: white;
  font-size: 12px;
  cursor: pointer;

  transition:
    transform 120ms ease,
    box-shadow 120ms ease,
    background-color 120ms ease;
}

.app-dock button:active {
  transform: scale(0.88);
  box-shadow: 0 0 0 6px rgba(255,255,255,0.08);
}


.screen {
  position:absolute;
  inset: 0;
  margin-top: 0px;
  color: white;
  background: rgb(0, 0, 0);
  border-radius: 12px;
  transform: translateY(110%) scale(0.96);
  opacity: 0;
  pointer-events: none;

  transition:
    transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.25s ease;

  z-index: 9;
  overflow: hidden;
  

}
.phone.locked .screen {
  pointer-events: none;
  opacity: 0;
}
.phone-open .card,
.phone-open .search-box {
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}


.screen-open {
  transform: translateY(0) scale(1);
  opacity: 1;
  pointer-events: auto;
}
.system-nav {
  position: absolute;
  bottom: 2px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 11;
}

.system-nav button {
  background: none;
  border: none;
  color: rgb(255, 255, 255);
  font-size: 10px;
  cursor: pointer;
  
  padding: 4px 8px;
  border-radius: 50%;

  transition:
    transform 0.15s ease,
    background-color 0.15s ease,
    opacity 0.15s ease;
}
.system-nav button:hover {
  text-decoration:none;
  background-color: rgba(255, 255, 255, 0.08);
  transform: scale(1.2);
}
.contacts-screen {
  height: 90%;
  display: flex;
  flex-direction: column;
}
.contacts-list {
  flex: 1;
  overflow: scroll;
  overflow-x: hidden;
}
.contact-card {
  padding: 8px;
  border-bottom: 1px solid rgba(214, 0, 0, 0.836);
}

.contact-name {
  font-size: 8px;
  font-weight: bold;
  margin-bottom: 4px;
}
.contact-number {
  font-size: 7px;
  font-weight: bold;
  margin-bottom: 4px;
}
.contact-actions {
  display: flex;
  gap: 6px;
}

.contact-actions button {
  flex: 1;
  font-size: 6px;
  padding: 4px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.call-btn {
  background: #1e90ff;
  color: white;
}

.msg-btn {
  background: #25d366;
  color: black;
}

.contact-actions button:active {
  transform: scale(0.9);
}


.camera {
  height: 80%;
  width: 100%;
  display: flex;
  flex-direction: column;
  background: black;
  color: white;
}
.cam-header {
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  font-size: 8px;
  background: rgba(0,0,0,0.6);
}

.cam-header button {
  background: none;
  border: none;
  color: white;
  font-size: 10px;
  cursor: pointer;
}
.cam-preview {
  flex: 1;
  position: relative;
  background: black;
  display: flex;
  justify-content: center; 
  align-items: center;

}

.cam-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cam-footer {
  height: 42px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.cam-shutter {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 3px solid white;
  background: transparent;
  cursor: pointer;
  transition:
    transform 120ms ease,
    box-shadow 120ms ease;
}

.cam-shutter:active {
  transform: scale(0.85);
  box-shadow: 0 0 0 6px rgba(255,255,255,0.15);
}
.photo-preview {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: black;
}

.photo-preview img {
  flex: 1;
  object-fit: contain;
}

.preview-actions {
  height: 70px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(0, 0, 0, 0.85);
}


.preview-actions button {
  background: #25d366;
  border: none;
  color: white;
  font-size: 7px;
  padding: 4px 8px;
  border-radius: 12px;
  cursor: pointer;
}

.preview-actions button:first-child {
  background: #444;
  color: #fff;
}
.preview-actions button:last-child {
  background: #1abc9c;
  color: #000;
}
.preview-actions button:hover {
  opacity: 0.8;
}

.grid-screen {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  text-align: center;
}

.grid-app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.grid-app:active {
  transform: scale(0.9);
}

.grid-icon {
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.grid-name {
  font-size: 6px;
  opacity: 0.85;
}
.google {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: white;
  color: black;
  font-size: 8px;
  z-index: 18;
}

.google-header {
  display: flex;
  gap: 6px;
  padding: 6px;
  border-bottom: 1px solid #ddd;
}

.google-header input {
  flex: 1;
  font-size: 7px;
  border: none;
  outline: none;
}

.google-results {
  padding: 6px;
}

.result {
  margin-top: 6px;
}
/* ===== CALCULATOR ===== */

.calculator {
  height: 79%;
  display: flex;
  flex-direction: column;
  padding: 8px;
  color: white;
}

.calc-display {
  height: 30px;
  background: black;
  color: #00ffcc;
  font-size: 13px;
  text-align: right;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 1px;
  overflow: hidden;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.calc-grid button {
  height: 28px;
  border: none;
  border-radius: 6px;
  background: #1e1e1e;
  color: white;
  font-size: 10px;
  cursor: pointer;
  transition: transform 0.1s ease, background 0.1s ease;
}

.calc-grid button:active {
  transform: scale(0.9);
}


.calc-op:active {
  transform: scale(0.9);
}

.calc-history {
  flex: 1;
  font-size: 6px;
  padding: 9px;
  background: #000;
  overflow:scroll;
  overflow-y: auto;
  overflow-x: auto;
}

/* NOTES APP */
.notes {
  height: 100%;
  display: flex;
  flex-direction: column;
  color: white;
}

.notes-header {
  height: 24px;
  background: #1f2933;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 8px;
  font-size: 8px;
}

.notes-header button {
  background: none;
  border: none;
  color: white;
  font-size: 10px;
  cursor: pointer;
}

.notes-input {
  flex: 1;
  background: #111;
  border: none;
  color: white;
  font-size: 8px;
  padding: 8px;
  outline: none;
  resize: none;
}
.dialer {
  padding: 10px;
  display: flex;
  flex-direction: column;
  height: 100%;
   background: #000000;
  
}
.dialer-display {
  margin-top: 20px;
  height: 30px;          
  font-size: 14px;
  text-align: center;
  margin-bottom: 2px;
  overflow: hidden;
  white-space: nowrap;      
}
.dialer-keys {  
  padding: 10px;            
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(4, 28px); 
  gap: 6px;
}
.dialer-keys button {
  width: 100%;
  height: 28px;              
  border-radius: 50%;
    background: #f2f2f2;
  font-size: 22px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
}
.dialer-keys button:active {
  transform: scale(0.9);
}

.dialer-actions {
  display: flex;
  justify-content: space-around;
  margin-top: 6px;
}

.dialer-call {
  border-radius: 50%;
  width: 30px;
  height: 30px;
    border-radius: 50%;
  background: #2ecc71;
  color: #fff;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.dialer-back {
  background: #555;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  border: none;
}
.call-screen {
  height: 100%;
  width: 100%;
  background: linear-gradient(180deg, #1c1c1c, #000);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 40px 20px;
}


.call-name {
  font-size: 22px;
  margin-top: 1px;
  letter-spacing: 1px;
}


.call-status {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 1px;
}

.call-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #333;
  display: flex;
  margin-top: 10px;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.6); }
  70% { box-shadow: 0 0 0 25px rgba(46, 204, 113, 0); }
  100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
}

.call-actions {
  width: 100%;
  display: flex;
  justify-content: space-around;
  margin-bottom: 30px;
}

.call-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin-top: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
}

.call-btn.end {
  background: #e74d3ca6;
}

.call-btn.mute {
  background: #444;
}

.call-btn.speaker {
  background: #444;
}

.dialer-keys {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.dialer-keys button,
.dialer-actions button {
  background: #1e1e1e;
  color: white;
  border: none;
  border-radius: 100%;
  height: 30px;
  font-size: 14px;
  cursor: pointer;
}
.message-list {
  height: 100%;
  padding: 6px;
  overflow:auto;
}

.msg-header {
  font-size: 9px;
  font-weight: bold;
  margin-bottom: 6px;
}

.msg-item {
  display: flex;
  gap: 6px;
  padding: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}

.msg-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #25d366;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
}
.msg-name { font-size: 7px; font-weight: bold; }
.msg-number { font-size: 6px; font-weight: bold; }
.msg-preview { font-size: 6px; opacity: 0.7; }
.message-chat {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.chat-header {
  height: 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 8px;
  background: #111;
}

.chat-body {
  flex: 1;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
}

.bubble {
  max-width: 70%;
  font-size: 7px;
  padding: 4px 6px;
  border-radius: 6px;
}
.bubble.me {
  align-self: flex-end;
  background: #1f7a4f;
}
.bubble.bot {
  align-self: flex-start;
  background: #333;
}
.message-list {
  padding: 6px;
}

.message-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
}

.avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #25d366;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: black;
}

.msg-info {
  flex: 1;
}

.msg-name {
  font-size: 7px;
  font-weight: bold;
}

.msg-preview {
  font-size: 6px;
  opacity: 0.7;
}

.msg-time {
  font-size: 6px;
  opacity: 0.6;
}
.chat {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.chat-header {
  height: 24px;
  background: #075e54;
  color: rgb(255, 255, 255);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 6px;
  font-size: 8px;
}

.chat-body {
  flex: 1;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
}

.bubble {
  max-width: 70%;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 7px;
  position: relative;
}

.bubble.me {
  background: #1f7a4f;
  align-self: flex-end;
}

.bubble.bot {
  background: #252525;
  align-self: flex-start;
}

.bubble .time {
  font-size: 5px;
  opacity: 0.6;
  margin-left: 6px;
}

.chat-input {
  display: flex;
  gap: 6px;
  padding: 4px;
  margin-bottom: 19px;
}

.chat-input input {
  flex: 1;
  font-size: 7px;
  border-radius: 12px;
  border: none;
  padding: 4px 6px;
}

.chat-input button {
  background: #25d366;
  border: none;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 9px;
}
/* ===============================
   MESSAGE CHAT (WHATSAPP STYLE)
   =============================== */

.message-chat {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #0b141a;
  color: white;
  font-size: 8px;
}
.wa-header {
  height: 26px;
  background: #075e54;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  flex-shrink: 0;
}

.wa-header button {
  background: none;
  border: none;
  color: white;
  font-size: 10px;
  cursor: pointer;
}

.wa-name {
  font-weight: bold;
}

.wa-status {
  font-size: 6px;
  opacity: 0.7;
}

.wa-messages {
  flex: 1;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  scrollbar-width: none;
}

.wa-messages::-webkit-scrollbar {
  display: none;
}
.wa-message {
  max-width: 75%;
  padding: 5px 6px;
  border-radius: 6px;
  position: relative;
  line-height: 1.3;
  word-wrap: break-word;
}
.wa-message.me {
  align-self: flex-end;
  background: #1f7a4f;
  border-bottom-right-radius: 2px;
}

.wa-message.bot {
  align-self: flex-start;
  background: #262d31;
  border-bottom-left-radius: 2px;
}

.msg-time {
  font-size: 5px;
  opacity: 0.6;
  margin-top: 2px;
  text-align: right;
}

.wa-input {
  height: 28px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px;
  background: #1f2933;
  flex-shrink: 0;
}

.wa-input input {
  flex: 1;
  background: #111827;
  border: none;
  color: white;
  font-size: 7px;
  border-radius: 20px;
  padding: 4px 8px;
  outline: none;

/* =============================================
   v3.0 UPGRADES — OS LEVEL
   ============================================= */

/* ── Dark / Light theme ── */
.theme-light { background: #f0f0f0 !important; color: #111; }
.theme-light .screen { background: #fff; color: #111; }
.theme-light .app-dock button { background: rgba(255,255,255,0.85); color: #111; }
.theme-light .system-nav button { color: #111; }
.theme-light .status-bar { color: #111; }
.theme-light .card { background: rgba(255,255,255,0.9); color: #111; }
.theme-light .search-box { background: rgba(255,255,255,0.9); }
.theme-light .search-box input { background: rgba(255,255,255,0.9); color: #111; }

/* ── Animated wallpaper particles ── */
.wallpaper-anim {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}
.wp-particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.12;
  animation: float linear infinite;
}
.wp-p0 { width:20px;height:20px;background:#fff;left:10%;top:20%;animation-duration:8s;animation-delay:0s; }
.wp-p1 { width:12px;height:12px;background:#fff;left:70%;top:50%;animation-duration:11s;animation-delay:2s; }
.wp-p2 { width:16px;height:16px;background:#fff;left:40%;top:70%;animation-duration:9s;animation-delay:1s; }
.wp-p3 { width:8px; height:8px; background:#fff;left:85%;top:15%;animation-duration:13s;animation-delay:3s; }
.wp-p4 { width:14px;height:14px;background:#fff;left:25%;top:85%;animation-duration:10s;animation-delay:0.5s; }
.wp-p5 { width:10px;height:10px;background:#fff;left:60%;top:30%;animation-duration:12s;animation-delay:4s; }
@keyframes float {
  0%   { transform: translateY(0) scale(1);   opacity:.1; }
  50%  { transform: translateY(-30px) scale(1.2); opacity:.2; }
  100% { transform: translateY(0) scale(1);   opacity:.1; }
}

/* ── PIN lock screen ── */
.pin-screen {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,#0f0c29,#302b63);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  z-index: 28;
  color: white;
}
.pin-time  { font-size:22px; font-weight:200; }
.pin-label { font-size:7px;  opacity:.7; }
.pin-dots  { display:flex; gap:8px; margin:4px 0; }
.pin-dot   {
  width:10px; height:10px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.6);
  background:transparent;
  transition:background .15s,border-color .15s;
}
.pin-dot.filled { background:white; }
.pin-dot.error  { border-color:#e74c3c; background:#e74c3c; }
.pin-error { font-size:6.5px; color:#e74c3c; }
.pin-grid  {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:5px; margin-top:4px;
}
.pin-btn {
  width:28px; height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  color:white; font-size:11px;
  cursor:pointer;
  transition:background .15s, transform .1s;
}
.pin-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.92); }

/* ── Notification center ── */
.notif-tab {
  position:absolute;
  top:2px; left:50%;
  transform:translateX(-50%);
  font-size:7px;
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  z-index:30;
  display:flex;
  align-items:center;
  gap:2px;
  background:rgba(0,0,0,0.3);
  padding:1px 6px;
  border-radius:8px;
  user-select:none;
  transition:color 0.2s ease;
}

.notif-tab:hover {
  color:white;
}
.notif-tab-count {
  background:#e74c3c; color:white;
  border-radius:50%; width:9px; height:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:5px;
}
.notif-center {
  position:absolute;
  top:0; left:0; right:0;
  background:rgba(15,15,30,0.97);
  z-index:26;
  padding:6px;
  padding-top:14px;
  border-bottom-left-radius:10px;
  border-bottom-right-radius:10px;
  max-height:75%;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  animation:slideDown .3s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.notif-center.closing {
  animation:slideUp .25s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes slideDown {
  from { transform:translateY(-100%); opacity:0; }
  to   { transform:translateY(0);     opacity:1; }
}

@keyframes slideUp {
  from { transform:translateY(0);     opacity:1; }
  to   { transform:translateY(-100%); opacity:0; }
}
.notif-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:5px; padding-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.notif-clear-btn {
  background:none; border:none; color:#e74c3c;

}
.notif-empty { font-size:6.5px; opacity:.4; text-align:center; padding:8px; }
.notif-item  {
  display:flex; align-items:flex-start; gap:5px;

  background:rgba(255,255,255,.05);
  margin-bottom:3px;
}
.notif-icon { font-size:11px; }
.notif-body { flex:1; }
.notif-app  { font-size:5.5px; opacity:.5; font-weight:700; text-transform:uppercase; }
.notif-text { font-size:6.5px; color:white; margin-top:1px; }
.notif-time { font-size:5px; opacity:.4; color:white; }
